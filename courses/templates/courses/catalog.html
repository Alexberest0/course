{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог курсов</title>
    <link rel="stylesheet" href="{% static 'courses/catalog.css' %}">
    <script src="{% static 'courses/catalog.js' %}" defer></script>
</head>
<body>
    <h1>Наши курсы</h1>
    <div class="course-list">
        {% if courses %}
            {% for course in courses %}
                <div class="course-card">
                    <h2><a href="{% url 'course_detail' course.slug %}">{{ course.title }}</a></h2>
                    <div class="course-description">{{ course.description|truncatewords:20 }}</div>
                    <div class="course-price">{{ course.price }} ₽</div>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty-message">Пока нет ни одного курса. Зайдите в админку и добавьте.</div>
        {% endif %}
    </div>
</body>
</html>
