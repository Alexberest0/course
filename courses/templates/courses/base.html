<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мои курсы{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'catalog' %}">Каталог</a>
            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}">Выйти ({{ user.phone_number }})</a>
            {% else %}
                <a href="{% url 'login' %}">Вход</a>
                <a href="{% url 'register' %}">Регистрация</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
